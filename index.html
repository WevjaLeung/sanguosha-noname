<!-- DEBUG: loading indicator and error tracker -->
<script>
(function(){
  document.documentElement.style.background = '#1a1a2e';
  document.documentElement.style.margin = '0';
  
  // Create loading overlay
  var overlay = document.createElement('div');
  overlay.id = '__debug_overlay';
  overlay.innerHTML = '<div style="text-align:center;color:#fff;font-family:-apple-system,sans-serif">'
    + '<div style="font-size:48px">&#127183;</div>'
    + '<div id="__debug_msg" style="color:#e94560;font-size:18px;font-weight:bold;margin-top:12px">加载中...</div>'
    + '<div id="__debug_log" style="color:#888;font-size:12px;margin-top:8px;max-height:120px;overflow-y:auto;white-space:pre-wrap;text-align:left;padding:0 20px"></div>'
    + '</div>';
  overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:#1a1a2e;display:flex;align-items:center;justify-content:center;z-index:999999';
  document.documentElement.appendChild(overlay);
  
  var logEl = document.getElementById('__debug_log');
  var msgEl = document.getElementById('__debug_msg');
  var startTime = Date.now();
  
  window.__dbg = function(m) {
    var t = ((Date.now() - startTime) / 1000).toFixed(1) + 's';
    logEl.textContent += t + ' ' + m + '\n';
    console.log('[DBG ' + t + ']', m);
  };
  
  window.__dbgOK = function() {
    overlay.style.display = 'none';
  };
  
  window.__dbgFail = function(m) {
    msgEl.textContent = '❌ ' + m;
    msgEl.style.color = '#ff6b6b';
  };
  
  // Catch global errors
  var _onerror = window.onerror;
  window.onerror = function(m,s,l,c,e){
    __dbgFail('JS错误: ' + (m||'').toString().substring(0,100));
    __dbg('ERR: ' + m + ' @ ' + s + ':' + l);
    if(_onerror) _onerror.apply(this,arguments);
  };
  
  var _onrej = window.onunhandledrejection;
  window.onunhandledrejection = function(ev){
    var r = ev.reason;
    __dbgFail('Promise错误: ' + ((r&&r.message)||r||'unknown'));
    if(_onrej) _onrej.apply(this,arguments);
  };
  
  __dbg('页面初始化');
})();
</script>

	<script>
		"use strict";
		(() => {
			window.onerror = function (msg, src, line, column, err) {
				let str = `错误文件: ${typeof src == "string" && src.length > 0 ? decodeURI(src) : "未知文件"}`;
				str += `\n错误信息: ${msg}`;
				str += `\n行号: ${line}`;
				str += `\n列号: ${column}`;
				if (err && err.stack) str += "\n" + decodeURI(err.stack);
				console.error(str);
				alert(str);
			};
			const STACK_REGEXP = /^\s*at .*(\S+:\d+|\(native\))/m;
			const errorList = [];
			function extractLocation(urlLike) {
				// 不存在地址信息的字符串
				if (!/:/.test(urlLike)) {
					return [urlLike];
				}

				// 捕获位置用到的正则
				const regExp = /(.+?)(?::(\d+))?(?::(\d+))?$/;
				const parts = regExp.exec(urlLike.replace(/[()]/g, ""));

				// @ts-ignore
				return [parts[1], parts[2] || void 0, parts[3] || void 0];
			}
			window.onunhandledrejection = async (event) => {
				event.promise.catch((error) => {
					console.log(error);
					// 如果`error`是个错误，则继续处理
					if (error instanceof Error) {
						// 如果已经处理过该错误，则不再处理
						if (errorList.includes(error)) return;
						errorList.push(error);
						// 如果`error`拥有字符串形式的报错栈堆，且报错栈堆确实符合v8的stack
						if (typeof error.stack === "string" && STACK_REGEXP.test(error.stack)) {
							// 获取符合栈堆信息的字符串，一般来说就是从第二行开始的所有行
							// 为了处理eval的情况，故必须获取完行数
							let lines = error.stack.split("\n").filter((line) => STACK_REGEXP.test(line));

							// 提供类型信息防止vscode报错
							/**
							 * @type {string | undefined}
							 */
							let fileName = void 0;

							/**
							 * @type {number | undefined}
							 */
							let line = void 0;

							/**
							 * @type {number | undefined}
							 */
							let column = void 0;

							// 从第一条开始遍历，一直遍历到不存在eval的位置
							for (let currentLine = 0; currentLine < lines.length; ++currentLine) {
								if (/\(eval /.test(lines[currentLine])) continue;

								let formatedLine = lines[currentLine]
									.replace(/^\s+/, "")
									.replace(/\(eval code/g, "(")
									.replace(/^.*?\s+/, "");

								const location = formatedLine.match(/ (\(.+\)$)/);
								if (location) formatedLine = formatedLine.replace(location[0], "");

								const locationParts = extractLocation(location ? location[1] : formatedLine);

								fileName = ["eval", "<anonymous>"].includes(locationParts[0])
									? void 0
									: locationParts[0];
								line = Number(locationParts[1]);
								column = Number(locationParts[2]);
								break;
							}

							// @ts-ignore
							window.onerror(error.message, fileName, line, column, error);
						}
						// 反之我们只能不考虑报错文件信息，直接调用onerror
						else {
							try {
								// @ts-ignore
								let [_, src = void 0, line = void 0, column = void 0] =
									/at\s+.*\s+\((.*):(\d*):(\d*)\)/i.exec(error.stack.split("\n")[1]);
								if (typeof line == "string") line = Number(line);
								if (typeof column == "string") column = Number(column);
								// @ts-ignore
								window.onerror(error.message, src, line, column, error);
							} catch (e) {
								window.onerror(error.message, "", 0, 0, error);
							}
						}
					}
				});
			};
		})();
	</script>
	<script>
		"use strict";
		if (
			location.href.startsWith("http") &&
			typeof window.initReadWriteFunction != "function" &&
			!window.require &&
			!window.__dirname
		) {
			window.initReadWriteFunction = async function (game) {
				return new Promise((resolve, reject) => {
					fetch(`./checkFile?fileName=noname.js`)
						.then((response) => {
							return response.json();
						})
						.then((result) => {
							if (result && result.success) callback();
							else reject(result.errorMsg);
						})
						.catch(reject);

					function callback() {

						/**
						 * 检查指定的路径是否是一个文件
						 *
						 * @param {string} fileName - 需要查询的路径
						 * @param {(result: -1 | 0 | 1) => void} [callback] - 回调函数；接受的参数意义如下:
						 *  - `-1`: 路径不存在或无法访问
						 *  - `0`: 路径的内容不是文件
						 *  - `1`: 路径的内容是文件
						 * @param {(err: Error) => void} [onerror] - 接收错误的回调函数
						 * @return {void} - 由于三端的异步需求和历史原因，文件管理必须为回调异步函数
						 */
						game.checkFile = function (fileName, callback, onerror) {
							fetch(`./checkFile?fileName=${fileName}`)
                                .then(response => response.json())
                                .then(result => {
									if (result) {
                                        if (result.success) {
											callback?.(1);
											return;
                                        }

										if (result.code === 404) {
											if (result.errorMsg === "不是一个文件") return void callback?.(0);
											else if (result.errorMsg === "文件不存在或无法访问") return void callback?.(-1);
                                        }
                                    }

									onerror?.(result?.errorMsg);
                                })
                                .catch(onerror);
						}

						/**
						 * 检查指定的路径是否是一个目录
						 *
						 * @param {string} dir - 需要查询的路径
						 * @param {(result: -1 | 0 | 1) => void} [callback] - 回调函数；接受的参数意义如下:
						 *  - `-1`: 路径不存在或无法访问
						 *  - `0`: 路径的内容不是目录
						 *  - `1`: 路径的内容是目录
						 * @param {(err: Error) => void} [onerror] - 接收错误的回调函数
						 * @return {void} - 由于三端的异步需求和历史原因，文件管理必须为回调异步函数
						 */
						game.checkDir = function (dir, callback, onerror) {
							fetch(`./checkDir?dir=${dir}`)
								.then(response => response.json())
								.then(result => {
									if (result) {
										if (result.success) {
											callback?.(1);
											return;
										}

										if (result.code === 404) {
											if (result.errorMsg === "不是一个文件夹") return void callback?.(0);
											else if (result.errorMsg === "文件夹不存在或无法访问") return void callback?.(-1);
										}
									}

									onerror?.(result?.errorMsg);
								})
								.catch(onerror);
						}

						game.readFile = function (fileName, callback = () => {}, error = () => {}) {
							fetch(`./readFile?fileName=${fileName}`)
								.then((response) => {
									return response.json();
								})
								.then((result) => {
									if (result && result.success)
										callback(new Uint8Array(result.data).buffer);
									else error(result && result.errorMsg);
								})
								.catch(error);
						};

						game.readFileAsText = function (fileName, callback = () => {}, error = () => {}) {
							fetch(`./readFileAsText?fileName=${fileName}`)
								.then((response) => {
									return response.json();
								})
								.then((result) => {
									if (result && result.success) callback(result.data);
									else error(result && result.errorMsg);
								})
								.catch(error);
						};

						game.writeFile = function (data, path, name, callback = () => {}) {
							game.ensureDirectory(path, function () {
								if (Object.prototype.toString.call(data) == "[object File]") {
									const fileReader = new FileReader();
									fileReader.onload = function (e) {
										game.writeFile(e.target.result, path, name, callback);
									};
									fileReader.readAsArrayBuffer(data, "UTF-8");
								} else {
									let filePath = path;
									if (path.endsWith("/")) {
										filePath += name;
									} else if (path == "") {
										filePath += name;
									} else {
										filePath += "/" + name;
									}

									fetch(`./writeFile`, {
										method: "post",
										headers: { "Content-Type": "application/json" },
										body: JSON.stringify({
											data:
												typeof data == "string"
													? data
													: Array.prototype.slice.call(new Uint8Array(data)),
											path: filePath,
										}),
									})
										.then((response) => {
											return response.json();
										})
										.then((result) => {
											if (result && result.success) {
												callback();
											} else {
												callback(result.errorMsg);
											}
										});
								}
							});
						};

						game.removeFile = function (fileName, callback = () => {}) {
							fetch(`./removeFile?fileName=${fileName}`)
								.then((response) => {
									return response.json();
								})
								.then((result) => {
									callback(result.errorMsg);
								})
								.catch(error);
						};

						game.getFileList = function (dir, callback = () => {}, onerror) {
							fetch(`./getFileList?dir=${dir}`)
								.then((response) => {
									return response.json();
								})
								.then((result) => {
									if (!result) {
										throw new Error("Cannot get available resource.");
									}

									if (result.success) {
										callback(result.data.folders, result.data.files);
									} else if (onerror) {
										onerror(new Error(result.errorMsg));
									}
								});
						};

						game.ensureDirectory = function (list, callback = () => {}, file = false) {
							let pathArray = typeof list == "string" ? list.split("/") : list;
							if (file) {
								pathArray = pathArray.slice(0, -1);
							}
							game.createDir(pathArray.join("/"), callback, console.error);
						};

						game.createDir = (
							directory,
							successCallback = () => {},
							errorCallback = () => {}
						) => {
							fetch(`./createDir?dir=${directory}`)
								.then((response) => {
									return response.json();
								})
								.then((result) => {
									if (result && result.success) {
										successCallback();
									} else {
										errorCallback(new Error("创建文件夹失败"));
									}
								})
								.catch(errorCallback);
						};
						game.removeDir = (
							directory,
							successCallback = () => {},
							errorCallback = () => {}
						) => {
							fetch(`./removeDir?dir=${directory}`)
								.then((response) => {
									return response.json();
								})
								.then((result) => {
									if (result && result.success) {
										successCallback();
									} else {
										errorCallback(new Error("创建文件夹失败"));
									}
								})
								.catch(errorCallback);
						};

						resolve();
					}
				});
			};
		}
	</script>

<script>
(function() {
  var HOST = 'add-representatives-remedies-archived.trycloudflare.com';
  var tries = 0;
  setInterval(function() {
    tries++;
    try {
      if (window.game && window.game.connect && !window.game.online && tries === 3) {
        window.game.connect(HOST);
      }
      if (window.game && window.game.online && tries > 5) tries = 100;
    } catch(e) {}
  }, 1000);

  // 每 2 秒给房间列表加进入按钮
  setInterval(function() {
    try {
      if (!window.game || !window.game.online) return;
      var rooms = document.querySelectorAll('.popup.text.pointerdiv');
      for (var i = 0; i < rooms.length; i++) {
        var room = rooms[i];
        if (room.querySelector('.my-enter-btn')) continue;
        var key = room._link ? room._link.serving : null;
        if (!key) continue;
        var btn = document.createElement('button');
        btn.className = 'my-enter-btn';
        btn.textContent = '👉 进入';
        btn.style.cssText = 'display:block;width:90%;margin:4px auto;padding:10px;background:#e94560;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:bold;cursor:pointer;pointer-events:auto';
        btn.onclick = function(e) {
          e.stopPropagation();
          e.stopImmediatePropagation();
          e.preventDefault();
          try {
            var nick = localStorage.getItem('noname_config_connect_nickname_connect') || '玩家';
            window.game.send('server', 'enter', key, nick, '');
            alert('发送进房请求: ' + key);
          } catch(ex) { alert('error: '+ex.message); }
          return false;
        };
        btn.ontouchend = btn.onclick;
        room.parentNode.appendChild(btn);
      }
    } catch(e) {}
  }, 2000);
})();
</script>

<script>
// 房主快捷复制房号
setInterval(function(){
  try {
    // 找房名显示的文字
    var els = document.querySelectorAll('div');
    for (var i=0; i<els.length; i++) {
      var el = els[i];
      // 找包含"的房间"且有 sibling 的文字节点
      if (el.textContent && el.textContent.indexOf('的房间') > 0 && !el.querySelector('.copy-room-btn')) {
        var roomName = el.textContent.replace(/\s+/g,'').match(/[^的房间]+/);
        if (roomName) {
          var btn = document.createElement('button');
          btn.className = 'copy-room-btn';
          btn.textContent = '📋 复制房号';
          btn.style.cssText = 'margin-left:8px;padding:2px 10px;background:#27ae60;color:#fff;border:none;border-radius:4px;font-size:13px;cursor:pointer;pointer-events:auto;z-index:999';
          btn.onclick = function(e){
            e.stopPropagation(); e.stopImmediatePropagation(); e.preventDefault();
            navigator.clipboard.writeText(roomName[0]).then(function(){
              btn.textContent = '✅ 已复制';
              setTimeout(function(){ btn.textContent = '📋 复制房号'; }, 2000);
            }).catch(function(){
              alert('房名: ' + roomName[0]);
            });
            return false;
          };
          el.appendChild(btn);
        }
      }
    }
  } catch(e) {}
}, 1500);
</script>
